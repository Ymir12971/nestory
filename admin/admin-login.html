<!DOCTYPE html>
<html lang="zh-CN">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>Admin Portal — Sign in</title>
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link
      href="https://fonts.googleapis.com/css2?family=Inter:wght@400;600;700&display=swap"
      rel="stylesheet"
    />
    <style>
      :root {
        --ink: #0f172a;
        --muted: #94a3b8;
        --muted-dark: #64748b;
        --slate: #334155;
        --slate-mid: #475569;
        --surface: #f1f5f9;
        --field-bg: #f8fafc;
        --border-field: #cbd5e1;
        --border-card: #e2e8f0;
        --primary: #2563eb;
        --primary-dark: #1d4ed8;
        --white: #ffffff;
        --snow: #f8fafc;
        --ice: #eff6ff;
      }

      *,
      *::before,
      *::after {
        box-sizing: border-box;
      }

      body {
        margin: 0;
        min-height: 100vh;
        font-family: Inter, system-ui, sans-serif;
        background: var(--ink);
        color: var(--snow);
        -webkit-font-smoothing: antialiased;
      }

      .shell {
        display: flex;
        min-height: 100vh;
        max-width: 1280px;
        margin: 0 auto;
        min-height: 720px;
      }

      .brand {
        flex: 0 0 520px;
        display: flex;
        flex-direction: column;
        gap: 28px;
        padding: 56px;
        background: var(--ink);
      }

      .brand__row {
        display: flex;
        align-items: center;
        gap: 14px;
      }

      .brand__mark {
        width: 44px;
        height: 44px;
        border-radius: 12px;
        background: var(--primary-dark);
        display: grid;
        place-items: center;
        font-size: 20px;
        font-weight: 700;
        color: var(--ice);
      }

      .brand__name {
        font-size: 24px;
        font-weight: 600;
        color: var(--snow);
      }

      .brand__title {
        margin: 0;
        font-size: 34px;
        font-weight: 700;
        color: var(--snow);
        line-height: 1.2;
      }

      .brand__body {
        margin: 0;
        font-size: 15px;
        line-height: 1.55;
        color: var(--muted);
        max-width: 36rem;
      }

      .brand__spacer {
        flex: 1;
      }

      .brand__footer {
        margin: 0;
        font-size: 13px;
        color: var(--muted-dark);
      }

      .form-area {
        flex: 1;
        display: flex;
        align-items: center;
        justify-content: center;
        padding: 48px 24px;
        background: var(--surface);
      }

      .card {
        width: 100%;
        max-width: 440px;
        padding: 40px;
        border-radius: 16px;
        background: var(--white);
        border: 1px solid var(--border-card);
        box-shadow: 0 12px 40px rgba(15, 23, 42, 0.06);
        display: flex;
        flex-direction: column;
        gap: 20px;
      }

      .card__header {
        display: flex;
        flex-direction: column;
        gap: 8px;
      }

      .card__title {
        margin: 0;
        font-size: 26px;
        font-weight: 700;
        color: var(--ink);
      }

      .card__hint {
        margin: 0;
        font-size: 14px;
        color: var(--muted-dark);
      }

      label.field-label {
        font-size: 13px;
        font-weight: 600;
        color: var(--slate);
      }

      .input-wrap {
        height: 46px;
        padding: 0 14px;
        border-radius: 10px;
        background: var(--field-bg);
        border: 1px solid var(--border-field);
        display: flex;
        align-items: center;
      }

      .input-wrap:focus-within {
        border-color: var(--primary);
        outline: 2px solid rgba(37, 99, 235, 0.25);
        outline-offset: 0;
      }

      .input-wrap input {
        width: 100%;
        border: none;
        background: transparent;
        font: inherit;
        font-size: 15px;
        color: var(--ink);
      }

      .input-wrap input::placeholder {
        color: var(--muted-dark);
      }

      .input-wrap input:focus {
        outline: none;
      }

      .row-opts {
        display: flex;
        align-items: center;
        justify-content: space-between;
        gap: 16px;
        flex-wrap: wrap;
      }

      .remember {
        display: flex;
        align-items: center;
        gap: 8px;
        font-size: 13px;
        color: var(--slate-mid);
        cursor: pointer;
        user-select: none;
      }

      .remember input {
        width: 1rem;
        height: 1rem;
        accent-color: var(--primary);
      }

      .link-forgot {
        font-size: 13px;
        font-weight: 600;
        color: var(--primary);
        text-decoration: none;
      }

      .link-forgot:hover {
        text-decoration: underline;
      }

      .btn-submit {
        width: 100%;
        padding: 14px 18px;
        border: none;
        border-radius: 10px;
        background: var(--primary);
        color: var(--white);
        font-family: inherit;
        font-size: 15px;
        font-weight: 600;
        cursor: pointer;
      }

      .btn-submit:hover {
        filter: brightness(1.05);
      }

      .card__foot {
        margin: 0;
        font-size: 12px;
        color: var(--muted);
        text-align: center;
      }

      @media (max-width: 960px) {
        .shell {
          flex-direction: column;
          min-height: unset;
        }

        .brand {
          flex: unset;
        }
      }
    </style>
  </head>
  <body>
    <div class="shell">
      <aside class="brand" aria-label="品牌与说明">
        <div class="brand__row">
          <div class="brand__mark" aria-hidden="true">N</div>
          <span class="brand__name">Nestory</span>
        </div>
        <h1 class="brand__title">Admin Portal</h1>
        <p class="brand__body">
          Sign in to manage users, permissions, and system configuration from one
          secure console.
        </p>
        <div class="brand__spacer" aria-hidden="true"></div>
        <p class="brand__footer">Internal use only. All access is logged.</p>
      </aside>

      <main class="form-area">
        <form class="card" autocomplete="on">
          <div class="card__header">
            <h2 class="card__title">Sign in</h2>
            <p class="card__hint">Use your administrator credentials</p>
          </div>

          <label class="field-label" for="email">Email</label>
          <div class="input-wrap">
            <input
              id="email"
              name="email"
              type="email"
              placeholder="admin@company.com"
              required
            />
          </div>

          <label class="field-label" for="password">Password</label>
          <div class="input-wrap">
            <input
              id="password"
              name="password"
              type="password"
              placeholder="••••••••"
              required
            />
          </div>

          <div class="row-opts">
            <label class="remember">
              <input type="checkbox" name="remember" />
              Remember this device
            </label>
            <a class="link-forgot" href="#">Forgot password?</a>
          </div>

          <button class="btn-submit" type="submit">Sign in to console</button>

          <p class="card__foot">Having trouble? Contact IT support.</p>
        </form>
      </main>
    </div>
  </body>
</html>
